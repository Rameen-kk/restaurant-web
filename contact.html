<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - SoftGrid Solutions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; line-height: 1.6; }
    .navbar { 
      background: #fff; padding: 15px 5%; display: flex; 
      justify-content: space-between; align-items: center; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .navbar ul { display: flex; list-style: none; gap: 25px; }
    .navbar a { text-decoration: none; color: #333; font-weight: 500; }
    .container { max-width: 1100px; margin: 60px auto; padding: 0 20px; }
    .contact-grid { display: flex; flex-wrap: wrap; gap: 40px; margin-top: 40px; }
    .contact-grid > div { flex: 1; min-width: 300px; }
    input, textarea { 
      width: 100%; padding: 12px; margin-bottom: 15px; 
      border: 1px solid #ccc; border-radius: 5px; font-size: 15px;
    }
    button { 
      background: #3b5bdb; color: white; padding: 12px 30px; 
      border: none; border-radius: 5px; cursor: pointer; font-size: 16px;
    }
    button:hover { background: #2f4ba8; }
    #formError { color: red; margin-top: 10px; }
  </style>
</head>
<body>

  <!-- Navbar - same as index.html -->
  <nav class="navbar">
    <div class="logo">
      <img src="logo.png" alt="SoftGrid Solutions" height="40">
    </div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <a href="contact.html" style="background:#3b5bdb; color:#fff; padding:10px 20px; border-radius:25px; text-decoration:none;">Start Project →</a>
  </nav>

  <!-- Contact Section -->
  <div class="container">
    <h1 style="text-align: center;">Contact Page</h1>
    
    <div class="contact-grid">
      <!-- Contact Form -->
      <div>
        <h3>Send us a Message</h3>
        <form id="contactForm" novalidate>
          <input type="text" id="name" placeholder="Your Name" required>
          <input type="email" id="email" placeholder="Your Email" required>
          <input type="text" id="subject" placeholder="Subject" required>
          <textarea id="message" placeholder="Your Message" rows="5" required></textarea>
          <button type="submit">Send Message</button>
          <p id="formError"></p>
        </form>
      </div>

      <!-- Contact Information -->
      <div>
        <h3>Contact Information</h3>
        <p style="margin: 15px 0;"><strong>Address:</strong> Hyderabad, Sindh, Pakistan</p>
        <p style="margin: 15px 0;"><strong>Phone Number:</strong> +92 300 0000000</p>
        <p style="margin: 15px 0;"><strong>Email Address:</strong> info@softgridsolutions.com</p>
        
        <!-- Optional: Google Map -->
        <div style="margin-top: 20px;">
          <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d115582.60556903946!2d68.296512!3d25.396034!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x394c70f6d444e57b%3A0x35e5d297546c0e2a!2sHyderabad%2C%20Sindh%2C%20Pakistan!5e0!3m2!1sen!2s!4v1234567890"
            width="100%" height="250" style="border:0; border-radius: 5px;" allowfullscreen="" loading="lazy">
          </iframe>
        </div>
      </div>
    </div>
  </div>

  <!-- JS Validation -->
  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      let name = document.getElementById('name').value.trim();
      let email = document.getElementById('email').value.trim();
      let subject = document.getElementById('subject').value.trim();
      let message = document.getElementById('message').value.trim();
      let errorMsg = document.getElementById('formError');
      
      errorMsg.textContent = '';

      if (name === '' || email === '' || subject === '' || message === '') {
        errorMsg.textContent = 'All required fields must be validated before form submission.';
        return;
      }

      let emailPattern = /^\S+@\S+\.\S+$/;
      if (!emailPattern.test(email)) {
        errorMsg.textContent = 'Email field should validate proper email format.';
        return;
      }

      alert('Message sent successfully!');
      document.getElementById('contactForm').reset();
    });
  </script>

</body>
</html>
