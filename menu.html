<nav class="navbar">

<section class="menu">

<h1>Our Menu</h1>

<input type="text" id="search" placeholder="Search Food">

<div class="filters">
<button onclick="filterMenu('all')">All</button>
<button onclick="filterMenu('burger')">Burgers</button>
<button onclick="filterMenu('pizza')">Pizza</button>
<button onclick="filterMenu('drink')">Drinks</button>
</div>

<div class="cards">

<div class="menu-card burger">
<img src="images/burger.jpg">
<h3>Chicken Burger</h3>
<p>Fresh Chicken Burger</p>
<span>$8</span>
</div>

<div class="menu-card pizza">
<img src="images/pizza.jpg">
<h3>Cheese Pizza</h3>
<p>Loaded Cheese</p>
<span>$15</span>
</div>

<div class="menu-card drink">
<img src="images/drink.jpg">
<h3>Cold Drink</h3>
<p>Refreshing Beverage</p>
<span>$3</span>
</div>

</div>

</section>

<script src="js/script.js"></script>

</body>
